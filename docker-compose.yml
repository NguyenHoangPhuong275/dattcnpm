services:
  mongodb:
    image: mongo:7
    container_name: smart-travel-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Health check for Docker and orchestration tools
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Resource limits (recommended for student laptops)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: smart-travel-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  mongo_data:
  redis_data:
